# Install: pip install -e ".[dev,all]" && pre-commit install
# Run all hooks: pre-commit run --all-files
# Optional full test suite: pre-commit run pytest --hook-stage manual --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        entry: bash
        args:
          - -euc
          - |
            ROOT="$(git rev-parse --show-toplevel)"
            cd "$ROOT"
            if [ -x "$ROOT/.venv/bin/python" ]; then
              exec "$ROOT/.venv/bin/python" -m mypy agentrace cli
            fi
            exec python3 -m mypy agentrace cli
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        stages: [manual]
